services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hiberus_test
      POSTGRES_USER: hiberus
      POSTGRES_PASSWORD: hiberus
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiberus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hiberus:hiberus@db:5432/hiberus_test?serverVersion=16&charset=utf8"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:8000"

volumes:
  db_data: